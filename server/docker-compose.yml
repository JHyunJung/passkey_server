services:
  postgres:
    image: postgres:16-alpine
    container_name: passkey-postgres
    environment:
      POSTGRES_DB: passkey
      POSTGRES_USER: app_migrator
      POSTGRES_PASSWORD: change_me_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - log_statement=all
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_migrator -d passkey"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: passkey-redis
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
