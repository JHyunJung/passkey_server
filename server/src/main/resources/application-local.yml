spring:
  datasource:
    # Oracle 19c via Free Edition / XE on docker-compose. FREEPDB1 is the default PDB service name
    # for gvenzl/oracle-free; switch to XEPDB1 if running gvenzl/oracle-xe.
    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
    username: APP_RUNTIME
    password: change_me_local
    hikari:
      maximum-pool-size: 10
      auto-commit: false
      connection-test-query: SELECT 1 FROM DUAL

  flyway:
    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
    user: APP_MIGRATOR
    password: change_me_migrator
    placeholders:
      app_runtime_password: change_me_local
      app_admin_password: change_me_admin

  data:
    redis:
      host: localhost
      port: 6379

passkey:
  admin:
    enabled: true
    # vite dev server. Browsers send Origin=http://localhost:5173, which must match exactly.
    console-origin: http://localhost:5173
    datasource:
      url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
      username: APP_ADMIN
      password: change_me_admin
      hikari:
        maximum-pool-size: 5
        auto-commit: false
        connection-test-query: SELECT 1 FROM DUAL
  # Local dev runs over HTTP — cookies cannot be Secure. Production keeps the default true.
  cookie:
    secure: false
  jwt:
    # RS256 so the Java RP SDK (NimbusJwtVerifier — RS256/JWKS only) can verify access tokens via
    # /.well-known/jwks.json. The HS256 secret stays configured for cutover-compat verification.
    algorithm: RS256
    kid: local-dev-rs256
    # Local-only secret. 32+ bytes to satisfy JwtProperties length check. Never reuse in prod.
    secret: local-dev-jwt-secret-must-be-at-least-32-bytes-long
