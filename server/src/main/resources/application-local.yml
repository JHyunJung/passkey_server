spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/passkey
    username: app_runtime
    password: change_me_local
    hikari:
      maximum-pool-size: 10
      auto-commit: false

  flyway:
    url: jdbc:postgresql://localhost:5432/passkey
    user: app_migrator
    password: change_me_local
    placeholders:
      app_runtime_password: change_me_local
      app_admin_password: change_me_admin

  data:
    redis:
      host: localhost
      port: 6379

passkey:
  admin:
    enabled: false
    # vite dev server. Browsers send Origin=http://localhost:5173, which must match exactly.
    console-origin: http://localhost:5173
    datasource:
      url: jdbc:postgresql://localhost:5432/passkey
      username: app_admin
      password: change_me_admin
      hikari:
        maximum-pool-size: 5
        auto-commit: false
  # Local dev runs over HTTP — cookies cannot be Secure. Production keeps the default true.
  cookie:
    secure: false
  jwt:
    # Local-only secret. 32+ bytes to satisfy JwtProperties length check. Never reuse in prod.
    secret: local-dev-jwt-secret-must-be-at-least-32-bytes-long
  actuator:
    username: actuator
    password: change-me-local-actuator
  mds:
    # Local dev: keep MDS off so the server can boot without external FIDO Alliance fetch.
    # Toggle to true (and provide a root CA) when you need to test MDS-strict tenants locally.
    enabled: false
