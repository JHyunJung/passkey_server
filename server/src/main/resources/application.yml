spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: passkey
    default-schema: passkey
    create-schemas: true
    baseline-on-migrate: false
  session:
    store-type: ${PASSKEY_SESSION_STORE:redis}
    timeout: 30m
    redis:
      flush-mode: on_save
      namespace: passkey:session

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p [%X{traceId:-},%X{spanId:-},%X{tenantId:-}]"

passkey:
  admin:
    enabled: ${PASSKEY_ADMIN_ENABLED:false}
  jwt:
    issuer: ${PASSKEY_JWT_ISSUER:passkey-platform}
    secret: ${PASSKEY_JWT_SECRET:change-me-to-a-long-random-string-at-least-32-bytes}
    access-ttl-seconds: 900
    refresh-ttl-seconds: 2592000
  rate-limit:
    enabled: ${PASSKEY_RATE_LIMIT_ENABLED:true}
    registration-per-minute: 30
    authentication-per-minute: 60
    default-per-minute: 120
