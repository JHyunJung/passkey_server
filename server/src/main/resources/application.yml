spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    # Oracle 19c via Hibernate 6's auto-detecting OracleDialect. 6.6+ no longer requires a version
    # suffix — the dialect probes server_version on first connection and emits 19c-compatible SQL.
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: validate
    # Open-Session-In-View is OFF — every JPA access must run inside an explicit @Transactional
    # boundary in a service/controller method. Leaving OSIV on hides lazy-load problems and keeps
    # connections checked out for the entire HTTP request, which fights the HikariCP sizing above.
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        # Tables live in APP_MIGRATOR's schema; runtime sessions connect as APP_RUNTIME /
        # APP_ADMIN. PUBLIC SYNONYMs make them addressable unqualified at runtime, but Hibernate's
        # schema validator needs to know the actual owner to read column metadata. Setting
        # default_schema makes JPA-generated SQL also use unqualified names (which then resolve
        # through the synonyms) while ddl-auto=validate inspects the correct catalog.
        default_schema: APP_MIGRATOR
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    # Oracle baseline lives under db/migration/. Legacy PostgreSQL scripts are archived under
    # db/archive_postgres/ and intentionally outside Flyway's scan path.
    locations: classpath:db/migration
    # On Oracle the schema IS the connecting user — APP_MIGRATOR owns all objects. We do NOT set
    # `schemas`/`default-schema` (those translate to ALTER SESSION SET CURRENT_SCHEMA which would
    # require the named user to exist beforehand).
    create-schemas: false
    baseline-on-migrate: false
  session:
    store-type: ${PASSKEY_SESSION_STORE:redis}
    timeout: 30m
    redis:
      flush-mode: on_save
      namespace: passkey:session

server:
  # SEC-2: trust X-Forwarded-For / X-Forwarded-Proto from internal proxies (LB / ingress).
  # The Tomcat RemoteIpValve rewrites HttpServletRequest.getRemoteAddr() so RateLimitFilter and
  # security loggers see the real client IP instead of the LB hop. Trusted-proxy CIDRs must be set
  # for each environment — the default below covers RFC1918 ranges + loopback.
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto
      internal-proxies: ${PASSKEY_TRUSTED_PROXIES:10\\.\\d+\\.\\d+\\.\\d+|172\\.(1[6-9]|2[0-9]|3[0-1])\\.\\d+\\.\\d+|192\\.168\\.\\d+\\.\\d+|127\\.0\\.0\\.1}
  servlet:
    session:
      cookie:
        name: PASSKEY_SESSION
        http-only: true
        # SEC-5: lock secure flag for default profile. local profile overrides to false (plain HTTP).
        secure: ${PASSKEY_COOKIE_SECURE:true}
        # Default lax for same-origin / local development. Cross-site admin console deployment
        # overrides to none in application-prod.yml (must pair with secure=true).
        same-site: ${PASSKEY_SESSION_SAME_SITE:lax}
        path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      # OBS-1: include DB + Redis in the k8s readiness probe so the pod drops out of the
      # service endpoint list when its critical dependencies are unreachable. Without this,
      # `/actuator/health/readiness` would only reflect Spring's ReadinessState (ACCEPTING_TRAFFIC
      # after refresh) and keep returning 200 even with the JDBC pool exhausted or Redis down.
      group:
        readiness:
          include: readinessState,db,redis
        liveness:
          include: livenessState
      show-details: never
  health:
    db:
      enabled: true
    redis:
      enabled: true

logging:
  pattern:
    level: "%5p [%X{traceId:-},%X{spanId:-},%X{tenantId:-}]"

passkey:
  admin:
    enabled: ${PASSKEY_ADMIN_ENABLED:false}
    # Admin console SPA origin allow-listed for CORS. Blank in default/local — CORS is disabled
    # entirely (same-origin only). Set in prod to e.g. https://admin.passkey.example.com.
    console-origin: ${PASSKEY_ADMIN_CONSOLE_ORIGIN:}
  # SEC-4 / SEC-5: shared switch for CSRF + session cookie Secure flag. Wire to env so the local
  # profile (HTTP) overrides to false; prod stays true.
  cookie:
    secure: ${PASSKEY_COOKIE_SECURE:true}
    # Cookie SameSite for CSRF token cookie. Lax for same-origin / local. None for cross-site
    # admin-console deployment (requires Secure=true and an allow-listed CORS origin).
    same-site: ${PASSKEY_COOKIE_SAME_SITE:Lax}
  jwt:
    issuer: ${PASSKEY_JWT_ISSUER:passkey-platform}
    # SEC-3: no default value. JwtProperties enforces >=32-byte secret at startup, so missing env
    # var fails fast instead of silently shipping a known string.
    secret: ${PASSKEY_JWT_SECRET:}
    # Optional previous secret for zero-downtime key rotation. When set, outstanding tokens signed
    # with the previous secret remain valid for verification (new tokens are signed with the
    # primary). Clear once the longest refresh-ttl window has passed.
    previous-secret: ${PASSKEY_JWT_SECRET_PREVIOUS:}
    access-ttl-seconds: 900
    refresh-ttl-seconds: 2592000
  rate-limit:
    enabled: ${PASSKEY_RATE_LIMIT_ENABLED:true}
    registration-per-minute: 30
    authentication-per-minute: 60
    default-per-minute: 120
    admin-login-per-minute: 5
    # Per-credential authenticate/verify cap. Defends a single passkey against brute-force /
    # signature-counter regression DoS. Independent of the per-tenant authenticate bucket above.
    credential-auth-verify-per-minute: 10
  api-key:
    # Argon2id parameters used when issuing new keys. Verify still reads encoded metadata, so a
    # tuning change applies only to keys issued thereafter.
    prefix-bytes: 6
    secret-bytes: 32
    max-prefix-attempts: 3
    argon2-memory-kb: 65536
    argon2-iterations: 2
    argon2-parallelism: 1
  webauthn:
    ceremony:
      challenge-bytes: 32
      challenge-ttl: PT5M
  mds:
    # FIDO MDS3 integration. Default ON — operators must mount the FIDO Alliance Global Root CA at
    # root-certificate-path (Kubernetes secret recommended). Override via PASSKEY_MDS_ENABLED=false
    # only for air-gapped deployments or local development. Strict tenants
    # (TenantAttestationPolicy.mdsStrict=true) require this to be enabled — when off, MDS strict
    # registration responds with MDS_UNAVAILABLE.
    enabled: ${PASSKEY_MDS_ENABLED:true}
    blob-url: ${PASSKEY_MDS_BLOB_URL:https://mds3.fidoalliance.org/}
    root-certificate-path: ${PASSKEY_MDS_ROOT_CA:classpath:fido/Global_Sign_Root_CA.pem}
    refresh-cron: ${PASSKEY_MDS_REFRESH_CRON:0 0 4 * * *}
    allow-not-fido-certified: ${PASSKEY_MDS_ALLOW_NON_CERTIFIED:true}
