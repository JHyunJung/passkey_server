spring:
  datasource:
    hikari:
      maximum-pool-size: 5
      auto-commit: false
      connection-test-query: SELECT 1 FROM DUAL
  flyway:
    placeholders:
      app_runtime_password: test_runtime
      app_admin_password: test_admin
  session:
    store-type: none

passkey:
  admin:
    enabled: false
  rate-limit:
    enabled: false
  jwt:
    secret: test-secret-please-ignore-this-is-32bytes-or-more
  mds:
    # Integration tests don't ship the FIDO Alliance root CA in the classpath — keep MDS off so
    # bean wiring doesn't fail. RegistrationService tests cover the MDS-strict path with their own
    # mocked provider where needed.
    enabled: false
