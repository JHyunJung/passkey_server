# Example production composition. Not for direct use — secrets must come from a real secret
# manager (AWS SSM, GCP Secret Manager, Vault). Postgres + Redis should be managed services in
# production rather than sidecar containers; this file is a localisation reference only.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: passkey
      POSTGRES_USER: app_migrator
      POSTGRES_PASSWORD: ${POSTGRES_MIGRATOR_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  app:
    image: ghcr.io/crosscert/passkey-server:0.1.0
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/passkey
      SPRING_DATASOURCE_USERNAME: app_runtime
      SPRING_DATASOURCE_PASSWORD: ${APP_RUNTIME_PASSWORD}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/passkey
      SPRING_FLYWAY_USER: app_migrator
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_MIGRATOR_PASSWORD}
      SPRING_FLYWAY_PLACEHOLDERS_APP_RUNTIME_PASSWORD: ${APP_RUNTIME_PASSWORD}
      SPRING_FLYWAY_PLACEHOLDERS_APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      PASSKEY_JWT_SECRET: ${PASSKEY_JWT_SECRET}
      PASSKEY_RATE_LIMIT_ENABLED: "true"
      PASSKEY_ADMIN_ENABLED: "true"
    ports:
      - "8080:8080"

volumes:
  pgdata:
